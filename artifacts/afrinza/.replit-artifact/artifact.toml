kind = "web"
previewPath = "/"
title = "Afrinza Marketplace"
version = "1.0.0"
id = "artifacts/afrinza"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20596

[services.development]
run = "pnpm --filter @workspace/afrinza run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afrinza", "run", "build" ]
publicDir = "artifacts/afrinza/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20596"
BASE_PATH = "/"
