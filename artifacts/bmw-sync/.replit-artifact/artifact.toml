kind = "web"
previewPath = "/bmw-sync/"
title = "BMW-Sync"
version = "1.0.0"
id = "artifacts/bmw-sync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/bmw-sync/" ]
localPort = 19367

[services.development]
run = "pnpm --filter @workspace/bmw-sync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bmw-sync", "run", "build" ]
run = "pnpm --filter @workspace/bmw-sync run start"

[services.env]
PORT = "19367"
BASE_PATH = "/bmw-sync/"
