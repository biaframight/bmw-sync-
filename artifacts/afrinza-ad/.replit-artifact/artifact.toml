kind = "video"
previewPath = "/afrinza-ad/"
title = "Afrinza Promo Video"
version = "1.0.0"
id = "artifacts/afrinza-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/afrinza-ad/" ]
localPort = 24991

[services.development]
run = "pnpm --filter @workspace/afrinza-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afrinza-ad", "run", "build" ]
publicDir = "artifacts/afrinza-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24991"
BASE_PATH = "/afrinza-ad/"
